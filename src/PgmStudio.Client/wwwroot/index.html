<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PgmStudio.Client</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="css/app.css" />
    <!-- Studio design system (ported verbatim from pgm-map-studio): tokens → components → editor. -->
    <link rel="stylesheet" href="css/studio/tokens.css" />
    <link rel="stylesheet" href="css/studio/components.css" />
    <link rel="stylesheet" href="css/studio/editor.css" />
    <link rel="stylesheet" href="css/studio/design.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PgmStudio.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="js/studio.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
