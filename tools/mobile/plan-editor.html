<title>PGM Plan Editor — portable</title>
<meta name="description" content="Offline, touch-ready plan editor for authoring PGM layout seeds on the go." />

<!--
  Portable plan editor — a self-contained, offline build of the pgm-studio plan editor
  (the seed studio). Bundles the browser-side editor modules into one file so a plan can
  be authored on a phone or in a chat artifact with no server.

  Sources bundled verbatim (imports inlined, server-only paths dropped):
    src/PgmStudio.Client/wwwroot/js/studio/geometry/symmetry.js
    src/PgmStudio.Client/wwwroot/js/studio/render/svg.js         (svgEl only)
    src/PgmStudio.Client/wwwroot/js/studio/plan/plan-doc.js
    src/PgmStudio.Client/wwwroot/js/studio/canvas/canvas-base.js
    src/PgmStudio.Client/wwwroot/js/studio/canvas/plan-canvas.js
  Chrome + document controller replace src/.../bridge/plan-bridge.js + the Blazor page.
  Plans autosave to localStorage and import/export as *.plan.json (same wire format as
  tools/seeds/*.plan.json). Added here for phones: touch drag + pinch-zoom (absent from the
  mouse-only source), a floating tool dock, fat resize handles, and a non-blocking selection
  bar (select never covers the canvas; full property editing is opt-in via Edit).
  Omitted (require the server): live lint, the interface/frontline overlays, the Wall tool,
  and Compile/draft/world-export — author here, compile in the full studio.
-->

<script type="module">
  /* ==================================================================== *
   *  geometry/symmetry.js                                                 *
   * ==================================================================== */
  function applySymmetry(x, z, axis, cx, cz) {
    switch (axis) {
      case "mirror_x":  return [2 * cx - x, z];
      case "mirror_z":  return [x, 2 * cz - z];
      case "mirror_d1": return [cx + (z - cz), cz + (x - cx)];
      case "mirror_d2": return [cx - (z - cz), cz - (x - cx)];
      case "rot_180":   return [2 * cx - x, 2 * cz - z];
      case "rot_90":    return [cx - (z - cz), cz + (x - cx)];
      case "rot_270":   return [cx + (z - cz), cz - (x - cx)];
      default: throw new Error(`Unknown symmetry axis: ${axis}`);
    }
  }
  function orbitAxes(type) {
    return type === "rot_90" ? ["rot_90", "rot_180", "rot_270"] : [type];
  }
  function applySymmetryToBounds(bounds, axis, cx, cz) {
    const { min_x, max_x, min_z, max_z } = bounds;
    const corners = [[min_x, min_z], [max_x, min_z], [max_x, max_z], [min_x, max_z]]
      .map(([x, z]) => applySymmetry(x, z, axis, cx, cz));
    const xs = corners.map(([x]) => x);
    const zs = corners.map(([, z]) => z);
    return { min_x: Math.min(...xs), max_x: Math.max(...xs), min_z: Math.min(...zs), max_z: Math.max(...zs) };
  }

  /* ==================================================================== *
   *  render/svg.js (svgEl)                                                *
   * ==================================================================== */
  function svgEl(tag, attrs = {}, children = []) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    for (const ch of children) el.appendChild(ch);
    return el;
  }

  /* ==================================================================== *
   *  plan/plan-doc.js                                                     *
   * ==================================================================== */
  const ROLES = ["piece", "wool-room", "spawn", "buffer"];
  const ROLE_COLORS = { piece: "#7c8899", "wool-room": "#3fae74", spawn: "#8f7bd6", buffer: "#f2792b" };
  const ROLE_LABELS = { piece: "Piece", "wool-room": "Wool room", spawn: "Spawn", buffer: "Buffer" };
  function canonicalRole(role) { return role === "wool-room" || role === "spawn" || role === "buffer" ? role : "piece"; }

  const FACINGS = ["front", "right", "back", "left"];
  const FACING_DIR = { front: [0, -1], right: [1, 0], back: [0, 1], left: [-1, 0] };
  function nextFacing(f) { const i = FACINGS.indexOf(f); return FACINGS[(i + 1) % FACINGS.length]; }

  function emptyDoc() {
    return {
      plan: 1,
      meta: { name: "Untitled plan" },
      globals: { cell: 5, symmetry: "rot_180", maxPlayers: 12, surface: 9, headroom: 11 },
      pieces: [], zones: [],
      placements: { spawns: [], wools: [], iron: [] },
      cliffs: [], walls: [],
    };
  }

  function normalizeDoc(d) {
    const src = d || {};

      } else if (panId != null) {
        const t = [...e.touches].find(x => x.identifier === panId) || e.touches[0];
        if (t) { lastX = t.clientX; lastY = t.clientY; dispatch(document, "mousemove", t.clientX, t.clientY, 1); }
      }
      e.preventDefault();
    }, { passive: false });

    const endTouch = (e) => {
      if (e.touches.length === 0) {
        pinchD = null;
        if (panId != null) { const t = e.changedTouches[0] || { clientX: lastX, clientY: lastY }; dispatch(document, "mouseup", t.clientX, t.clientY, 0); panId = null; }
      } else if (e.touches.length === 1 && pinchD != null) {
        pinchD = null;   // pinch released to a single finger — drop it, don't start a drag mid-gesture
      }
      e.preventDefault();
    };
    svg.addEventListener("touchend", endTouch, { passive: false });
    svg.addEventListener("touchcancel", endTouch, { passive: false });
  }

  /* ==================================================================== *
   *  Chrome + document controller (replaces plan-bridge + Blazor page)    *
   * ==================================================================== */
  const STORAGE_KEY = "pgm-plan-editor";
  const HEIGHTMAP_KEY = "pgm-plan-heightmap";
  const THEME_KEY = "pgm-plan-theme";
  const $ = (id) => document.getElementById(id);

  // Ensure a mobile-friendly viewport even in the artifact skeleton (no <head> control there).
  if (!document.querySelector('meta[name="viewport"]')) {
    const mv = document.createElement("meta");
    mv.name = "viewport"; mv.content = "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no";
    document.head.appendChild(mv);
  }

  // Theme: restore saved choice, else follow the OS.
  try { const th = localStorage.getItem(THEME_KEY); if (th) document.documentElement.setAttribute("data-theme", th); } catch { /* private mode */ }

  const svg = $("planSvg"), wrap = $("planWrap"), cursorEl = $("cursorReadout");
  let doc = emptyDoc();
  let canvasRole = "piece";
  let heightMap = false;
  try { heightMap = localStorage.getItem(HEIGHTMAP_KEY) === "1"; } catch { /* default */ }

  const canvas = new PlanCanvas(svg, wrap, {
    cursorEl,
    onSelect: (sel) => renderInspector(sel),
    onZoom: (pct) => { $("zoomLabel").textContent = pct + "%"; },
    onTool: (t) => reflectTool(t),
    onChange: () => scheduleSave(),
    onCreate: (kind, rect) => createRect(kind, rect),
    onDelete: (sel) => deleteSelection(sel),
  });
  installTouch(svg);

  // ── document mutations ──────────────────────────────────────────────
  function createRect(kind, rect) {
    if (kind === "zone") {
      const id = uniqueId(doc.zones.map(z => z.id), "zone");
      doc.zones.push({ id, rect, holes: [] });
      canvas.setDoc(doc); canvas.select({ kind: "zone", id });
    } else {
      const role = canvasRole;
      const base = role === "wool-room" ? "wool" : role === "spawn" ? "spawn" : role === "buffer" ? "buffer" : "piece";
      const id = uniqueId(doc.pieces.map(p => p.id), base);
      doc.pieces.push({ id, role, rect });
      canvas.setDoc(doc); canvas.select({ kind: "piece", id });
    }
    scheduleSave();
  }

  function deleteSelection(sel) {
    if (!sel) return;
    if (sel.kind === "piece") {
      const p = doc.pieces.find(x => x.id === sel.id);
      doc.pieces = doc.pieces.filter(x => x.id !== sel.id);
      if (p) {
        doc.placements.spawns = doc.placements.spawns.filter(m => m.piece !== sel.id);
        doc.placements.wools = doc.placements.wools.filter(m => m.piece !== sel.id);
        doc.placements.iron = doc.placements.iron.filter(m => m.piece !== sel.id);
        doc.cliffs = (doc.cliffs || []).filter(c => c.a !== sel.id && c.b !== sel.id);
        doc.walls = (doc.walls || []).filter(w => w.a !== sel.id && w.b !== sel.id);
      }
    } else if (sel.kind === "zone") {
      doc.zones = doc.zones.filter(x => x.id !== sel.id);
    } else if (sel.kind === "marker") {
      const list = sel.markerKind === "spawn" ? doc.placements.spawns : sel.markerKind === "wool" ? doc.placements.wools : doc.placements.iron;
      list.splice(sel.index, 1);
    }
    canvas.clearSelection(); canvas.setDoc(doc); scheduleSave();
  }

  let saveTimer = null;
  function scheduleSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { try { localStorage.setItem(STORAGE_KEY, toJson(doc)); } catch { /* private mode */ } }, 500);
  }

  function loadDoc(next, { fit = true } = {}) {
    doc = normalizeDoc(next);
    canvas.clearSelection(); canvas.setDoc(doc);
    if (fit) canvas.fit();
    syncGlobalsForm(); scheduleSave();
  }

  // ── toolbar / palette ───────────────────────────────────────────────
  let tool = "select";
  const ROLE_META = ROLES.map(id => ({ id, label: ROLE_LABELS[id], color: ROLE_COLORS[id] }));
  const BUILD_TOOLS = [
    { id: "zone", label: "Build area", swatch: "dash" },
    { id: "spawn", label: "Spawn", color: MARKER_COLORS.spawn, swatch: "ring" },
    { id: "wool", label: "Wool", color: MARKER_COLORS.wool, swatch: "ring" },
    { id: "iron", label: "Iron", color: MARKER_COLORS.iron, swatch: "ring" },
  ];

  function buildPalettes() {
    const rp = $("rolePalette"); rp.innerHTML = "";
    for (const r of ROLE_META) {
      const btn = document.createElement("button");
      btn.className = "tool-btn"; btn.dataset.tool = "piece"; btn.dataset.role = r.id;
      btn.innerHTML = `<span class="swatch" style="--role:${r.color}"></span>${r.label}`;
      btn.addEventListener("click", () => pickRole(r.id));
      rp.appendChild(btn);
    }
    const tp = $("toolPalette"); tp.innerHTML = "";
    for (const t of BUILD_TOOLS) {
      const btn = document.createElement("button");
      btn.className = "tool-btn"; btn.dataset.tool = t.id;
      const sw = t.swatch === "dash" ? `<span class="swatch swatch--dash"></span>` : `<span class="swatch swatch--ring" style="--role:${t.color}"></span>`;
      btn.innerHTML = `${sw}${t.label}`;
      btn.addEventListener("click", () => pickTool(t.id));
      tp.appendChild(btn);
    }
  }

  // Floating tool dock (mobile) — Select / Pan and the draw tools, over the canvas. The Piece
  // control is a split button: the body arms the current role, the caret opens the role popover.
  function buildDock() {
    const dock = $("toolDock"); dock.innerHTML = "";
    const simple = (label, t) => { const b = document.createElement("button"); b.className = "dock-btn"; b.dataset.tool = t; b.textContent = label; b.addEventListener("click", () => pickTool(t)); return b; };
    dock.append(simple("Select", "select"), simple("Pan", "pan"));
    const sep = document.createElement("div"); sep.className = "dock-sep"; dock.append(sep);

    const group = document.createElement("div"); group.className = "dock-piece";
    const main = document.createElement("button"); main.className = "dock-btn"; main.id = "dockPiece"; main.dataset.tool = "piece";
    main.innerHTML = `<span class="swatch" id="dockPieceSw"></span><span id="dockPieceLbl">Piece</span>`;
    main.addEventListener("click", () => { closeRolePop(); pickRole(canvasRole); });
    const caret = document.createElement("button"); caret.className = "dock-btn dock-caret"; caret.textContent = "▾"; caret.setAttribute("aria-label", "Choose piece role");
    caret.addEventListener("click", (e) => { e.stopPropagation(); $("rolePop").classList.toggle("open"); });
    group.append(main, caret); dock.append(group);

    dock.append(simple("Zone", "zone"), simple("Spawn", "spawn"), simple("Wool", "wool"), simple("Iron", "iron"));

    const pop = $("rolePop"); pop.innerHTML = "";
    for (const r of ROLE_META) {
      const b = document.createElement("button"); b.className = "tool-btn";
      b.innerHTML = `<span class="swatch" style="--role:${r.color}"></span>${r.label}`;
      b.addEventListener("click", () => { closeRolePop(); pickRole(r.id); });
      pop.append(b);
    }
  }
  function closeRolePop() { $("rolePop").classList.remove("open"); }
  document.addEventListener("click", (e) => { const pop = $("rolePop"); if (pop.classList.contains("open") && !pop.contains(e.target)) closeRolePop(); });

  function pickTool(t) {
    tool = t;
    canvas.setTool(t);
    reflectTool(t);
    if (window.matchMedia("(max-width: 900px)").matches) closeLeft();
  }
  function pickRole(role) {
    canvasRole = ROLES.includes(role) ? role : "piece";
    tool = "piece";
    canvas.setPieceRole(canvasRole);
    canvas.setTool("piece");
    reflectTool("piece");
    if (window.matchMedia("(max-width: 900px)").matches) closeLeft();
  }

  // Sync the active state of every tool/role/chip button to the current tool.
  function reflectTool(t) {
    tool = t;
    $("tSelect").classList.toggle("chip--active", t === "select");
    $("tPan").classList.toggle("chip--active", t === "pan");
    for (const btn of document.querySelectorAll("#rolePalette .tool-btn"))
      btn.classList.toggle("tool-btn--active", t === "piece" && btn.dataset.role === canvasRole);
    for (const btn of document.querySelectorAll("#toolPalette .tool-btn"))
      btn.classList.toggle("tool-btn--active", btn.dataset.tool === t);
    for (const btn of document.querySelectorAll("#toolDock .dock-btn"))
      if (btn.dataset.tool) btn.classList.toggle("dock-btn--active", btn.dataset.tool === t);
    const sw = $("dockPieceSw"), lbl = $("dockPieceLbl");
    if (sw) sw.style.setProperty("--role", ROLE_COLORS[canvasRole]);
    if (lbl) lbl.textContent = ROLE_LABELS[canvasRole];
  }

  // ── globals form ────────────────────────────────────────────────────
  function syncGlobalsForm() {
    $("planName").value = doc.meta.name || "";
    $("gSym").value = doc.globals.symmetry;
    $("gCell").value = doc.globals.cell;
    $("gSurface").value = doc.globals.surface;
    $("gHeadroom").value = doc.globals.headroom;
    $("gPlayers").value = doc.globals.maxPlayers;
  }
  function setGlobal(key, value) {
    const g = doc.globals;
    if (key === "symmetry") g.symmetry = value;
    else { const n = Number(value); if (!Number.isFinite(n)) return; g[key] = n; }
    canvas.setDoc(doc);
    if (key === "cell") canvas.fit();
    scheduleSave();
  }

  $("planName").addEventListener("change", (e) => { doc.meta.name = e.target.value || "Untitled plan"; scheduleSave(); });
  $("gSym").addEventListener("change", (e) => setGlobal("symmetry", e.target.value));
  $("gCell").addEventListener("change", (e) => setGlobal("cell", e.target.value));
  $("gSurface").addEventListener("change", (e) => setGlobal("surface", e.target.value));
  $("gHeadroom").addEventListener("change", (e) => setGlobal("headroom", e.target.value));
  $("gPlayers").addEventListener("change", (e) => setGlobal("maxPlayers", e.target.value));

  // ── inspector ───────────────────────────────────────────────────────
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  const isMobile = () => window.matchMedia("(max-width: 900px)").matches;
  let currentSel = null;

  // The slim mobile selection bar: names the selection and offers Edit / Delete / Deselect,
  // WITHOUT covering the canvas — so a selected piece stays draggable and resizable.
  function updateSelBar(sel) {
    currentSel = sel;
    const bar = $("selBar");
    if (!isMobile() || !sel) { bar.classList.remove("show"); return; }
    let kind, id;
    if (sel.kind === "piece") { kind = "Piece"; id = sel.id; }
    else if (sel.kind === "zone") { kind = "Build area"; id = sel.id; }
    else { kind = sel.markerKind; id = "on " + (sel.piece || ""); }
    $("selKind").textContent = kind;
    $("selId").textContent = id;
    bar.classList.add("show");
  }

  function renderInspector(sel) {
    const body = $("inspBody"), title = $("inspTitle");

    if (!sel) {
      title.textContent = "Inspector";
      body.innerHTML = `<p class="section-desc">Select a piece, build area or marker to inspect. Draw a piece from the toolbar, then drop spawns / wools onto it.</p>`;
      updateSelBar(null);
      if (isMobile()) closeRight();
      return;
    }

    if (sel.kind === "piece") {
      title.textContent = "Piece";
      const roleOpts = ROLE_META.map(r => `<option value="${r.id}" ${r.id === sel.role ? "selected" : ""}>${r.label}</option>`).join("");
      body.innerHTML = `
        <div class="field"><label class="field-label">Id</label><input class="field-input" id="ins_id" value="${esc(sel.id)}" /></div>
        <div class="field"><label class="field-label">Role</label><select class="field-input" id="ins_role">${roleOpts}</select></div>
        <div class="field"><label class="field-label">Surface (y)</label>
          <div class="ctrl-row">
            <button class="btn" id="ins_sdown">−</button>
            <span class="stepper-value">${sel.surface}${sel.surfaceSet ? "" : " (base)"}</span>
            <button class="btn" id="ins_sup">+</button>
          </div></div>
        <div class="stack" style="margin-top:12px">
          <button class="btn btn--full" id="ins_mirror">${sel.mirrors ? "Exclude from mirror" : "Include in mirror"}</button>
          <button class="btn btn--full btn--danger" id="ins_del">Delete piece</button>
        </div>`;
      $("ins_id").addEventListener("change", (e) => setPieceId(sel.id, e.target.value.trim()));
      $("ins_role").addEventListener("change", (e) => setPieceRole(sel.id, e.target.value));
      $("ins_sdown").addEventListener("click", () => stepPieceSurface(sel.id, -2));
      $("ins_sup").addEventListener("click", () => stepPieceSurface(sel.id, 2));
      $("ins_mirror").addEventListener("click", () => togglePieceMirrors(sel.id));
      $("ins_del").addEventListener("click", () => deleteSelection(sel));
    } else if (sel.kind === "zone") {
      title.textContent = "Build area";
      body.innerHTML = `
        <div class="field"><label class="field-label">Id</label><input class="field-input" id="ins_id" value="${esc(sel.id)}" /></div>
        <button class="btn btn--full btn--danger" id="ins_del" style="margin-top:12px">Delete build area</button>`;
      $("ins_id").addEventListener("change", (e) => setZoneId(sel.id, e.target.value.trim()));
      $("ins_del").addEventListener("click", () => deleteSelection(sel));
    } else {
      title.textContent = sel.markerKind;
      const at = Array.isArray(sel.at) ? `${sel.at[0]}, ${sel.at[1]}` : "";
      const facingRow = sel.markerKind === "spawn"
        ? `<div class="field"><label class="field-label">Facing</label>
             <div class="ctrl-row"><span class="stepper-value" id="ins_facing">${esc(sel.facing || "front")}</span>
             <button class="btn" id="ins_cycle" title="Cycle facing">Rotate</button></div></div>` : "";
      body.innerHTML = `
        <div class="field"><label class="field-label">On piece</label>
          <div class="readout">${esc(sel.piece || "")} &nbsp; <span style="color:var(--text-muted)">at ${at}</span></div></div>
        ${facingRow}
        <button class="btn btn--full btn--danger" id="ins_del" style="margin-top:12px">Delete marker</button>`;
      if (sel.markerKind === "spawn") $("ins_cycle").addEventListener("click", () => cycleFacing(sel.index));
      $("ins_del").addEventListener("click", () => deleteSelection(sel));
    }
    updateSelBar(sel);
  }

  // Inspector edit operations (mirror the source bridge's setters).
  function setPieceId(oldId, newId) {
    const p = doc.pieces.find(x => x.id === oldId); if (!p || !newId || newId === oldId) { renderInspector(canvas.getSelection() && selDto()); return; }
    const id = uniqueId(doc.pieces.filter(x => x !== p).map(x => x.id), newId);
    for (const m of [...doc.placements.spawns, ...doc.placements.wools, ...doc.placements.iron]) if (m.piece === oldId) m.piece = id;
    for (const c of [...(doc.cliffs || []), ...(doc.walls || [])]) { if (c.a === oldId) c.a = id; if (c.b === oldId) c.b = id; }
    p.id = id;
    canvas.setDoc(doc); canvas.select({ kind: "piece", id }); scheduleSave();
  }
  function setPieceRole(id, role) { const p = doc.pieces.find(x => x.id === id); if (!p) return; p.role = role; canvas.setDoc(doc); canvas.select({ kind: "piece", id }); scheduleSave(); }
  function stepPieceSurface(id, delta) {
    const p = doc.pieces.find(x => x.id === id); if (!p) return;
    const next = (p.surface ?? doc.globals.surface) + delta;
    if (next === doc.globals.surface) delete p.surface; else p.surface = next;
    canvas.setDoc(doc); canvas.select({ kind: "piece", id }); scheduleSave();
  }
  function togglePieceMirrors(id) { const p = doc.pieces.find(x => x.id === id); if (!p) return; if (p.mirrors === false) delete p.mirrors; else p.mirrors = false; canvas.setDoc(doc); canvas.select({ kind: "piece", id }); scheduleSave(); }
  function setZoneId(oldId, newId) {
    const z = doc.zones.find(x => x.id === oldId); if (!z || !newId || newId === oldId) return;
    z.id = uniqueId(doc.zones.filter(x => x !== z).map(x => x.id), newId);
    canvas.setDoc(doc); canvas.select({ kind: "zone", id: z.id }); scheduleSave();
  }
  function cycleFacing(index) {
    const m = doc.placements.spawns[index]; if (!m) return;
    m.facing = nextFacing(m.facing);
    canvas.setDoc(doc); canvas.select({ kind: "marker", markerKind: "spawn", index }); scheduleSave();
  }
  function selDto() { return null; }

  // ── top-bar actions ─────────────────────────────────────────────────
  $("btnNew").addEventListener("click", () => { if (confirm("Start a blank plan? Unsaved edits to the current plan are cleared.")) loadDoc(emptyDoc()); });
  $("btnExport").addEventListener("click", () => {
    const slug = (doc.meta.name || "plan").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "plan";
    const blob = new Blob([toJson(doc)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `${slug}.plan.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  });
  $("btnImport").addEventListener("click", () => $("fileInput").click());
  $("fileInput").addEventListener("change", (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { try { loadDoc(fromJson(String(reader.result))); } catch (err) { alert("Import failed: " + (err?.message || "invalid plan JSON")); } };
    reader.readAsText(file);
    e.target.value = "";
  });

  $("btnTheme").addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme")
      || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    const next = cur === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem(THEME_KEY, next); } catch { /* private mode */ }
    canvas.render();
  });

  $("tSelect").addEventListener("click", () => pickTool("select"));
  $("tPan").addEventListener("click", () => pickTool("pan"));
  $("cFit").addEventListener("click", () => canvas.fit());
  $("cHeights").addEventListener("click", () => {
    heightMap = !heightMap;
    $("cHeights").classList.toggle("chip--active", heightMap);
    try { localStorage.setItem(HEIGHTMAP_KEY, heightMap ? "1" : "0"); } catch { /* private mode */ }
    canvas.setHeightMap(heightMap);
  });

  // ── mobile drawers ──────────────────────────────────────────────────
  const scrim = $("scrim");
  function openLeft() { $("leftPanel").classList.add("open"); scrim.classList.add("show"); }
  function closeLeft() { $("leftPanel").classList.remove("open"); if (!$("rightPanel").classList.contains("open")) scrim.classList.remove("show"); }
  function openRight() { $("rightPanel").classList.add("open"); scrim.classList.add("show"); }
  function closeRight() { $("rightPanel").classList.remove("open"); if (!$("leftPanel").classList.contains("open")) scrim.classList.remove("show"); }
  $("tglLeft").addEventListener("click", () => $("leftPanel").classList.contains("open") ? closeLeft() : openLeft());
  $("sheetClose").addEventListener("click", () => closeRight());   // keep the selection; collapse to the bar
  scrim.addEventListener("click", () => { closeLeft(); closeRight(); });

  // Selection bar: full editor on demand, delete, or deselect — none of which cover the canvas.
  $("selEdit").addEventListener("click", () => openRight());
  $("selDel").addEventListener("click", () => { if (currentSel) deleteSelection(currentSel); });
  $("selDeselect").addEventListener("click", () => canvas.clearSelection());

  // ── boot ────────────────────────────────────────────────────────────
  buildPalettes();
  buildDock();
  try { const saved = localStorage.getItem(STORAGE_KEY); if (saved) doc = fromJson(saved); } catch { doc = emptyDoc(); }
  canvas.setHeightMap(heightMap);
  $("cHeights").classList.toggle("chip--active", heightMap);
  canvas.setDoc(doc);
  canvas.fit();
  canvas.resize();
  syncGlobalsForm();
  reflectTool("select");
  renderInspector(null);

  window.addEventListener("resize", () => canvas.resize());
  if (window.ResizeObserver) new ResizeObserver(() => canvas.resize()).observe(wrap);
</script>
